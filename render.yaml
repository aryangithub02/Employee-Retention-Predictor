services:
  # Backend FastAPI Web Service
  - type: web
    name: employee-retention-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: USE_SQLITE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: employee-retention-db
          property: connectionString

  # Frontend React Static Site
  - type: web
    name: employee-retention-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    routes:
      - type: rewrite
        path: /api/*
        # Match your backend web service's domain
        destination: https://employee-retention-backend.onrender.com/api/*
      # Support React Router client-side routing
      - type: rewrite
        path: /*
        destination: /index.html

databases:
  - name: employee-retention-db
    plan: free
